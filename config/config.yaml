app:
  name: "PortW\xE4chter Suite"
  mode: 4
  root_dir: /opt/portwaechter
  timezone: Europe/Berlin
  base_currency: EUR
paths:
  raw: /opt/portwaechter/data/raw
  audit_jsonl: /opt/portwaechter/data/audit/portfolio_audit.jsonl
portfolio:
  source:
    type: tr_pdf
    inbox: /opt/portwaechter/data/inbox
  validation:
    total_tolerance_eur: 0.5
marketdata:
  provider: stooq
  interval_seconds: 300
  cooldown_min: 60
  isin_to_symbol: /opt/portwaechter/config/isin_to_symbol.json
alerts:
  state_file: data/alerts/state.json
marketdata_alerts:
  enabled: true
  max_per_day: 10
  cooldown_minutes_per_isin: 120
  threshold_cross_only: false
  group_defaults:
    holdings:
      min_delta_pct: 0.7
      min_direction_pct: 0.9
      threshold_pct: 3.0
    radar:
      min_delta_pct: 1.2
      min_direction_pct: 1.5
      threshold_pct: 4.0
  adaptive:
    enabled: true
    lookback_points: 20
    k_multiplier: 1.2
    min_floor_pct: 0.6
    max_floor_pct: 2.5
    apply_to:
    - min_delta_pct
    - min_direction_pct
  message:
    max_len: 900
  send_on_direction_change: true
  send_on_threshold_cross: true
  send_on_delta: true
news:
  languages:
  - de
  - en
  translate_to: de
  interval_seconds: 900
  feed_sources:
  - name: IR
    url: https://www.eqs-news.com/feed/
  - name: Regulatory
    url: https://www.sec.gov/rss/news/press.xml
  - name: MarketWatch
    url: https://feeds.content.dowjones.io/public/rss/mw_topstories
notify:
  telegram:
    enabled: true
    bot_token_env: TG_BOT_TOKEN
    chat_id_env: TG_CHAT_ID
    cooldown_min: 30
signals:
  enabled: true
  thresholds:
    pct_move_intraday: 2.0
    pct_move_close_to_close: 3.0
    news_keyword_score_min: 3
    min_volume_points: 20
    volume_spike_ratio: 1.8
    multi_factor_score_min: 2
    pct_move_intraday_no_news: 2.5
    pct_move_close_to_close_no_news: 3.5
optimizer:
  enabled: true
  rebalance:
    max_position_weight_pct: 20
    max_top3_weight_pct: 45
radar:
  enabled: true
  min_score: 4
  sources:
    rss_feeds:
    - https://www.finanznachrichten.de/rss-nachrichten-aktien-deutschland
    - https://www.tagesschau.de/wirtschaft/finanzen/index~rss2.xml
    - https://feeds.finance.yahoo.com/rss/2.0/headline?s=%5EGDAXI&region=US&lang=en-US
    - https://feeds.finance.yahoo.com/rss/2.0/headline?s=AAPL,MSFT,GOOGL,NVDA&region=US&lang=en-US
briefing:
  morning:
    delta_lookback_days: 7
    volume_lights:
      green_ratio: 2.0
      yellow_ratio: 1.3
      min_volume_points: 20
    regime:
      risk_on_min: 2
      risk_off_min: 2
decision:
  bias: "{{BIAS}}"
  max_risk_per_trade_pct: "{{MAX_RISK_PER_TRADE_PCT}}"
  portfolio_value_eur: "{{PORTFOLIO_VALUE_EUR}}"
  max_setups_per_day: 2
performance:
  enabled: true
  telegram_min_n: 30
  telegram_min_n_regime: 20
  telegram_min_n_bucket: 15
  telegram_enabled: true
  horizons_days:
  - 1
  - 3
  - 5
  eval_lookback_days: 30
  weekly_report_day: Sun
  weekly_report_hour: 18
  min_samples_per_horizon:
    1d: 30
    3d: 30
    5d: 20
  min_samples_per_bucket: 20
  confidence_rules:
    min_win_rate_high: 0.55
  buckets:
    factor_score_min:
    - 2
    - 3
    - 4
    regimes:
    - risk_on
    - neutral
    - risk_off
    volume_lights:
    - green
    - yellow
    - red
    - gray
watch_alerts:
  enabled: true
  max_per_day: 5
  cooldown_minutes_per_isin: 360
  min_score: 3
  min_intraday_move_for_volume: 1.5
  prefer_sources:
  - IR
  - Ad-hoc
  - Regulatory
  include_holdings: true
  include_radar: true
telegram_commands:
  enabled: true
  poll_interval_minutes: 2
  allowed_chat_ids_env: TG_CHAT_ID
  state_file: data/telegram/command_state.json
  inbox_jsonl: data/telegram/inbox_YYYYMMDD.jsonl
  actions_jsonl: data/telegram/actions_YYYYMMDD.jsonl
alert_profiles:
  current: normal
  profiles:
    active:
      notify:
        telegram:
          enabled: true
      watch_alerts:
        enabled: true
        max_per_day: 10
        min_score: 2
        cooldown_minutes_per_isin: 180
        min_intraday_move_for_volume: 1.0
      marketdata_alerts:
        enabled: true
        max_per_day: 14
        threshold_cross_only: false
        group_defaults:
          holdings:
            min_delta_pct: 0.5
            min_direction_pct: 0.7
            threshold_pct: 2.6
          radar:
            min_delta_pct: 1.0
            min_direction_pct: 1.2
            threshold_pct: 3.6
      tactical_warnings:
        enabled: true
    normal:
      notify:
        telegram:
          enabled: true
      watch_alerts:
        enabled: true
        max_per_day: 5
        min_score: 3
        cooldown_minutes_per_isin: 360
        min_intraday_move_for_volume: 1.5
      marketdata_alerts:
        enabled: true
        max_per_day: 10
        threshold_cross_only: false
        group_defaults:
          holdings:
            min_delta_pct: 0.7
            min_direction_pct: 0.9
            threshold_pct: 3.0
          radar:
            min_delta_pct: 1.2
            min_direction_pct: 1.5
            threshold_pct: 4.0
      tactical_warnings:
        enabled: true
    quiet:
      notify:
        telegram:
          enabled: true
      watch_alerts:
        enabled: true
        max_per_day: 2
        min_score: 4
        cooldown_minutes_per_isin: 720
        min_intraday_move_for_volume: 2.5
      marketdata_alerts:
        enabled: true
        max_per_day: 4
        threshold_cross_only: true
        group_defaults:
          holdings:
            min_delta_pct: 1.0
            min_direction_pct: 1.2
            threshold_pct: 3.8
          radar:
            min_delta_pct: 1.5
            min_direction_pct: 1.8
            threshold_pct: 4.8
      tactical_warnings:
        enabled: true
    off:
      notify:
        telegram:
          enabled: false
      watch_alerts:
        enabled: false
      marketdata_alerts:
        enabled: false
      tactical_warnings:
        enabled: false
      performance:
        telegram_enabled: false
tactical_warnings:
  enabled: true
  min_n: 30
  horizons:
  - 3d
  warn_if_expectancy_below: 0.0
  cooldown_hours: 24
  state_file: data/performance/warn_state.json
